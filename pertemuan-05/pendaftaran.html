<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pendaftaran</title>
    <style>
        /* CSS Sederhana biar rapi saja, gak neko-neko */
        body {
            font-family: Arial, sans-serif;
            background-color: #2c72b4;
            padding: 20px;
        }
        .container {
            background-color: white;
            padding: 20px;
            max-width: 800px;
            margin: auto;
            border: 1px solid #ccc;
        }
        .header-logo {
            text-align: center;
            margin-bottom: 15px;
        }
        .header-logo img {
            max-width: 250px; 
            height: auto;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 20px;
        }
        input[type="text"], input[type="date"], select, textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        textarea {
            height: 60px;
        }
        .box-foto {
            width: 150px;
            height: 180px;
            border: 1px dashed #999;
            background-color: #eee;
            text-align: center;
            line-height: 180px;
            margin-bottom: 10px;
            color: #666;
        }
        button {
            padding: 10px 20px;
            background-color: #333;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #20c936;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-logo">
        <img src="aset/pondok saya.png" alt="Logo Instansi">
    </div>

    <h2 style="text-align: center;">Form Pendaftaran</h2>
    <p style="text-align: center;">Bacalah Syarat dan Petunjuk di Halaman Awal sebelum mengisi Pendaftaran</p>
    <hr>
    
    <h3>Data Diri</h3>
    
    <form action="sukses.html" method="POST" enctype="multipart/form-data" target="_blank">
        
        <div class="form-group">
            <label>Foto Anda</label>
            <div class="box-foto">4x6 Pas Foto</div>
            <input type="file" id="foto" name="foto" accept=".jpg,.jpeg,.png,.gif">
            <p style="font-size: 12px; color: green;">Hanya file jpg/png/jpeg/gif, ukuran 4x6.</p>
        </div>
        
        <hr>

        <div class="form-group">
            <label for="nama">Nama Lengkap </label>
            <input type="text" id="nama" name="nama" placeholder="Masukan nama" required>
        </div>
        
        <div class="form-group">
            <label for="gelombang">Gelombang </label>
            <select id="gelombang" name="gelombang" required>
                <option value="">-- Pilih --</option>
                <option value="1">Gelombang 1</option>
                <option value="2">Gelombang 2</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="tahun">Tahun Pendaftaran </label>
            <select id="tahun" name="tahun" required>
                <option value="">-- Pilih --</option>
                <option value="2026">2026</option>
                <option value="2027">2027</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="gender">Jenis Kelamin</label>
            <select id="gender" name="gender" required>
                <option value="">--Pilih--</option>
                <option value="L">Laki-laki</option>
                <option value="P">Perempuan</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="status_sekolah">Sudah Lulus / Masih Sekolah</label>
            <select id="status_sekolah" name="status_sekolah" required>
                <option value="Sudah Lulus Sekolah">Sudah Lulus Sekolah</option>
                <option value="Masih Sekolah">Masih Sekolah</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="tgl_lahir">Tanggal Lahir</label>
            <input type="date" id="tgl_lahir" name="tgl_lahir" required>
        </div>
        
        <div class="form-group">
            <label for="provinsi">Provinsi</label>
            <select id="provinsi" name="provinsi" required>
                <option value="Jakarta">Jakarta</option>
                <option value="Jawa Barat">Jawa Barat</option>
                <option value="Jawa Tengah">Jawa Tengah</option>
                <option value="Jawa Timur">Jawa Timur</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="jurusan">Program Yang Dituju</label>
            <select id="jurusan" name="jurusan" required>
                <option value="">Pilih Program</option>
                <option value="Teknik Informatika">Bisnis Digital</option>
                <option value="Sistem Informasi">Progamming</option>
                <option value="Akuntansi">Digital Marketing</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="hobi">Hobi</label>
            <input type="text" id="hobi" name="hobi">
        </div>
        
        <div class="form-group">
            <label for="cita_cita">Cita - Cita</label>
            <textarea id="cita_cita" name="cita_cita"></textarea>
        </div>
        
        <div class="form-group">
            <label for="alamat">Alamat Rumah</label>
            <textarea id="alamat" name="alamat" placeholder="Ex : Jl. Jambu Mulyo No.64 Rt/Rw 02/06 Banguntapan..."></textarea>
        </div>
        
        <div class="form-group">
            <button type="submit">Kirim Pendaftaran</button>
        </div>
        
    </form>
</div>

</body>
</html>
